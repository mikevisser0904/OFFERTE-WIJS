name: Autopilot (geld + agent)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autopilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Autopilot run
        id: run
        env:
          OUTBOUND_IN_AUTOPILOT: "1"
          VAKSCAN_SALES: "1"
          OUTBOUND_LIVE: ${{ secrets.OUTBOUND_LIVE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTBOUND_FROM: ${{ secrets.OUTBOUND_FROM }}
          OUTBOUND_WEBHOOK_URL: ${{ secrets.OUTBOUND_WEBHOOK_URL }}
        run: node scripts/autopilot-run.mjs
        continue-on-error: true

      - name: Commit status + health + wachtrij
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/autopilot-status.json public/autopilot-status.json public/health.json data/maarten-wachtrij.json public/maarten-wachtrij.json data/manager-status.json public/manager-status.json data/agents-status.json public/agents-status.json data/data-flow-status.json public/data-flow-status.json data/optimizer-status.json public/optimizer-status.json data/outbound-*.json public/outbound-*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "autopilot: status $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push || true

      - name: Summary
        run: |
          echo "## Autopilot" >> $GITHUB_STEP_SUMMARY
          cat data/autopilot-status.json >> $GITHUB_STEP_SUMMARY

      - name: Fail if site unhealthy
        if: steps.run.outcome == 'failure'
        run: exit 1