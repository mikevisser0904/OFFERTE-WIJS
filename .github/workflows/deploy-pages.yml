name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: GITHUB_PAGES=true GOOGLE_SITE_VERIFICATION=${{ secrets.GOOGLE_SITE_VERIFICATION }} npm run build
      - run: node scripts/health-check.mjs || true
      - run: node scripts/indexnow-submit.mjs || true
      - run: |
          for f in llms.txt og.svg health.json kpi-snapshot.json maarten-wachtrij.json autopilot-status.json \
            demo-pma-proof.json consent-deep-results.json auto-verify-status.json outreach-vandaag.json echte-klanten.json; do
            [ -f "public/$f" ] && cp "public/$f" "out/$f" || true
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment