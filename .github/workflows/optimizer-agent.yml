name: Agent Optimizer

on:
  schedule:
    # Elke 2 uur (meten + veilige apply), offset :15 t.o.v. data-flow :30
    - cron: "15 */2 * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Veilige fixes toepassen"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Optimizer
        run: |
          if [ "${{ github.event.inputs.apply }}" = "false" ]; then
            npm run agent:optimizer
          else
            npm run agent:optimizer:apply
          fi
      - run: npm run agent:manager
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "optimizer: auto $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push || true