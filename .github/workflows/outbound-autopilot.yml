name: Outbound Autopilot

on:
  schedule:
    - cron: "0 7,12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  outbound:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Outbound agent
        env:
          OUTBOUND_LIVE: ${{ secrets.OUTBOUND_LIVE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTBOUND_FROM: ${{ secrets.OUTBOUND_FROM }}
          OUTBOUND_WEBHOOK_URL: ${{ secrets.OUTBOUND_WEBHOOK_URL }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          VAKSCAN_SALES: "1"
        run: npm run agent:outbound-auto
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outbound-*.json public/outbound-*.json data/verkoop-vandaag.json public/verkoop-vandaag.json data/outreach-vandaag.json public/outreach-vandaag.json data/verkoop-effectiviteit.json public/verkoop-effectiviteit.json data/agents-status.json public/agents-status.json data/kpi-snapshot.json public/kpi-snapshot.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "agent: outbound-auto $(date -u +%Y-%m-%dT%H%MZ)"
          git pull --rebase origin main || true
          git push || true