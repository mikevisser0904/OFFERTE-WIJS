name: SEO weekly (build + sitemap)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node scripts/seo-add-from-pool.mjs
      - run: GITHUB_PAGES=true npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-landingen.ts data/seo-landing-pool.json
          git diff --staged --quiet || git commit -m "seo: weekly pool + build $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true