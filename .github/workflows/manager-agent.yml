name: Agent Manager

on:
  schedule:
    - cron: "30 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manager:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node scripts/health-check.mjs
      - run: npm run agent:manager
        continue-on-error: true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manager-status.json public/manager-status.json data/agents-status.json public/agents-status.json data/autopilot-status.json public/autopilot-status.json public/health.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "agent: manager $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push || true