name: Auto-verify

on:
  schedule:
    - cron: "45 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run agent:auto-verify
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto-verify: $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push || true