name: Lead hunter (OSM)

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node scripts/lead-hunter/osm-fetch.mjs
      - run: node scripts/security-scan/import-queue.mjs data/klanten-leads-import.txt
      - name: Commit leads + queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/potentiele-klanten.json public/potentiele-klanten.json data/klanten-leads-import.txt data/scan-queue.json public/scan-queue.json
          git diff --staged --quiet || git commit -m "lead-hunt: OSM klanten $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true