name: VakScan batch

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Scan pending queue (leak-modus)
        run: node scripts/security-scan/batch.mjs --mode=leaks --limit=120 --concurrency=5 --delay=350
      - name: Rescore leads na scan
        run: node scripts/lead-hunter/enrich-score.mjs

      - name: Data-flow sync
        run: npm run agent:dataflow

      - name: Commit reports + queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scan-queue.json public/scan-queue.json data/reports public/reports data/leak-hits.json public/leak-hits.json data/klanten-gescoord.json public/klanten-gescoord.json data/klanten-vandaag.json public/klanten-vandaag.json data/scan-stats.json public/scan-stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "vakscan: batch $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push || true