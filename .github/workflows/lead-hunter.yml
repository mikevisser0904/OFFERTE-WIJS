name: Agent Lead Hunter

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  leads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run agent:leads
        continue-on-error: true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/potentiele-klanten.json public/potentiele-klanten.json data/klanten-leads-import.txt data/scan-queue.json public/scan-queue.json data/agents-status.json public/agents-status.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "agent: lead-hunter $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true