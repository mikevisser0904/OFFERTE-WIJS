name: Traffic daily (SEO landings + IndexNow)

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Traffic agent
        run: node scripts/traffic-run.mjs
        env:
          TRAFFIC_LANDINGS_PER_RUN: "3"
      - run: GITHUB_PAGES=true npm run build
      - run: node scripts/agents/data-flow/run.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-landingen.ts data/seo-landing-pool.json data/traffic-status.json public/traffic-status.json public/sitemap.xml data/data-flow-status.json public/data-flow-status.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "traffic: daily landings + sitemap $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true